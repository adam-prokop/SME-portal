services:
  web:
    build:
      context: web/app
      args:
        - API_URL=http://backend:8000
    restart: unless-stopped
    networks:
      - frontend
    ports:
      - "${WEB_PORT:?Web server port}:3000"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./web/app/public/graphs:/app/public/graphs
    env_file:
      - .env
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 60s
      timeout: 60s
      retries: 100
      start_period: 300s

networks:
  frontend:
